<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>

.container{
    width:400px;
    margin:auto;
    margin-top:100px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

</style>
</head>
<body>

<h1>Admin Login</h1>

<form method="POST">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
